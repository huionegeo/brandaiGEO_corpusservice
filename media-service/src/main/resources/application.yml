server:
  port: 8084

spring:
  config:
    import: optional:file:./.env[.properties],optional:file:../.env[.properties]
  application:
    name: media-service
  cloud:
    nacos:
      username: ${NACOS_USER:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        file-extension: yaml
        import-check:
          enabled: false
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8858}
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/brandai_media
    username: ${POSTGRES_USER:brandai}
    password: ${POSTGRES_PASSWORD:brandai123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

file:
  upload-dir: ./uploads

logging:
  level:
    com.brandai.media: DEBUG
